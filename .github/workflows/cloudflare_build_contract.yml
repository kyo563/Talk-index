name: Cloudflare Build Contract

on:
  pull_request:
  push:
    branches: [main]

jobs:
  static-build-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate build env
        run: npm run validate:build-env

      - name: Build static assets
        run: npm run build

      - name: Verify preview outputs
        run: npm run preview:check
