name: Mirror favorites aggregates to Spreadsheet

on:
  schedule:
    # 毎日 18:00 JST = 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  mirror-favorites-r2-to-sheet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Mirror favorites aggregate JSON to Spreadsheet
        env:
          PYTHONPATH: ${{ github.workspace }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          PUBLIC_FAVORITES_SPREADSHEET_ID: ${{ secrets.PUBLIC_FAVORITES_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python exporter/favorites_r2_to_sheet.py
