name: Daily YouTube Crawl

on:
  schedule:
    # 毎日 00:00 UTC = 09:00 JST
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  crawl-and-write-sheet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily crawler
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_WORKSHEET_NAME: ${{ secrets.SPREADSHEET_WORKSHEET_NAME }}
          DAILY_MAX_RESULTS: ${{ secrets.DAILY_MAX_RESULTS }}
        run: python -m crawler.jobs.daily_crawl
