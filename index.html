<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talk-index | トーク索引</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="surface talk-area" aria-label="トーク集">
        <div id="result-meta" class="result-meta"></div>
        <div id="notice" class="notice"></div>
        <div id="error" class="error" role="alert"></div>
        <section id="results" class="results" aria-live="polite"></section>
      </section>

      <section class="surface control-menu" aria-label="操作メニュー">
        <div class="control-row top-row">
          <div id="server-status" class="server-status">通信状態: 未確認</div>
          <div class="menu-buttons">
            <button id="expand-all" type="button">展開</button>
            <button id="collapse-all" type="button">折り畳み</button>
          </div>
        </div>
        <div class="control-row">
          <input
            id="search"
            type="text"
            placeholder="検索（タイトル/大見出し/小見出し、タグは #キーワード）"
            aria-label="検索"
          />
        </div>
      </section>
    </main>

    <script>
      window.TALK_INDEX_DATA_URL = "https://pub-32b1e056728a40248bbab7a27ed72828.r2.dev/index/latest.json";
    </script>
    <script src="./app.js" defer></script>
  </body>
</html>
