<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talk-index | トーク索引</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <div class="ambient-header" aria-hidden="true">
        <div class="ambient-wave"></div>
      </div>

      <section class="surface talk-area" aria-label="トーク集">
        <div class="view-tabs-row">
          <div class="view-tabs" role="tablist" aria-label="表示モード切替">
            <button id="tab-video" class="view-tab is-active" type="button" role="tab" aria-selected="true">動画単位</button>
            <button id="tab-talk" class="view-tab" type="button" role="tab" aria-selected="false">トーク単位</button>
          </div>
          <button id="top-button" class="top-button" type="button" aria-label="ページ先頭へ戻る">TOP</button>
        </div>
        <div id="notice" class="notice"></div>
        <div id="error" class="error" role="alert"></div>
        <section id="results" class="results" aria-live="polite"></section>
      </section>

      <section class="surface control-menu" aria-label="操作メニュー">
        <div class="control-row top-row">
          <div id="server-status" class="server-status server-status--loading" aria-live="polite">読込中…</div>
          <div class="menu-buttons">
            <button id="toggle-all" type="button">全て展開</button>
            <button id="random-section" type="button">ランダムおすすめ</button>
          </div>
        </div>
        <div class="control-row search-row">
          <input
            id="search"
            type="text"
            placeholder="検索（タイトル/大見出し/小見出し、タグは #キーワード）"
            aria-label="検索"
          />
          <button id="clear-search" type="button">クリア</button>
        </div>
      </section>
    </main>

    <script>
      window.TALK_INDEX_DATA_URL = "https://pub-32b1e056728a40248bbab7a27ed72828.r2.dev/index/latest.json";
    </script>
    <script src="./app.js" defer></script>
  </body>
</html>
