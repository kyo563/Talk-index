<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talk-index | トーク索引</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="page-header">
        <h1>Talk-index</h1>
        <p>動画内トークを見出し構造で探せます。</p>
      </header>

      <section class="guide" aria-label="探索ガイド">
        <article class="guide-card">
          <h2>動画から探す</h2>
          <p>気になる動画を先に選んで、大見出し・小見出しへ降ります。</p>
        </article>
        <article class="guide-card">
          <h2>テーマから探す</h2>
          <p>気になる話題を先に選んで、該当動画へ移動します。</p>
        </article>
      </section>

      <section class="controls">
        <div class="tabs" role="tablist" aria-label="ビュー切替">
          <button id="tab-video" class="tab is-active" data-view="video" role="tab" aria-selected="true">
            動画から探す
          </button>
          <button id="tab-theme" class="tab" data-view="theme" role="tab" aria-selected="false">
            テーマから探す
          </button>
        </div>

        <label class="field">
          <span>検索</span>
          <input id="search" type="text" placeholder="タイトル / 大見出し / 小見出し / タグ" />
        </label>

        <label class="field">
          <span id="sort-label">並べ替え（動画単位）</span>
          <select id="sort"></select>
        </label>
      </section>

      <section class="status" aria-live="polite">
        <p id="result-meta" class="result-meta"></p>
        <p id="notice" class="notice"></p>
        <p id="error" class="error" role="alert"></p>
      </section>

      <section id="results" class="results" aria-live="polite"></section>
    </main>

    <script>
      window.TALK_INDEX_DATA_URL = "https://pub-32b1e056728a40248bbab7a27ed72828.r2.dev/index/latest.json";
    </script>
    <script src="./app.js" defer></script>
  </body>
</html>
